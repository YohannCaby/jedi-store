services:
  postgres:
    image: postgres:16-alpine
    container_name: pokestore-postgres
    environment:
      POSTGRES_DB: pokestore
      POSTGRES_USER: pokestore
      POSTGRES_PASSWORD: pokestore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pokestore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokestore -d pokestore"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: pokestore-api
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pokestore
      SPRING_DATASOURCE_USERNAME: pokestore
      SPRING_DATASOURCE_PASSWORD: pokestore
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pokestore-network

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: pokestore-mcp-server
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pokestore
      SPRING_DATASOURCE_USERNAME: pokestore
      SPRING_DATASOURCE_PASSWORD: pokestore
    depends_on:
      postgres:
        condition: service_healthy
      llm:
        condition: service_started
    networks:
      - pokestore-network

  orchestrateur:
    build:
      context: ./orchestrateur
      dockerfile: Dockerfile
    container_name: pokestore-orchestrateur
    ports:
      - "8080:8080"
    environment:
      MCP_SERVER_URL: http://mcp-server:8081
      SPRING_AI_OLLAMA_BASE_URL: http://ollama_ministral:11434
    depends_on:
      - mcp-server
      - llm
    networks:
      - pokestore-network
  llm:
    image: ollama/ollama
    container_name: ollama_ministral
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull ministral-3:3b && wait"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - pokestore-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    ports:
      - "8888:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    entrypoint: [ "/opt/keycloak/bin/kc.sh", "start-dev", "--import-realm", "--verbose"]
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-pokestore.json:/opt/keycloak/data/import/realm-pokestore.json
    networks:
      - pokestore-network

volumes:
  postgres_data:
  keycloak_data:
  ollama_data:

networks:
  pokestore-network:
    driver: bridge
