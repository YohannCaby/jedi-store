server:
  port: 8082

spring:
  application:
    name: poke-store-api
  datasource:
    url: jdbc:postgresql://localhost:5432/pokestore
    username: pokestore
    password: pokestore
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8888/realms/pokestore
logging:
  level:
    root: info