server:
  port: 8080

spring:
  application:
    name: poke-store-orchestrateur
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8888/realms/pokestore
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: ministral-3:3b
    mcp:
      client:
        type: SYNC
        toolcallback:
          enabled: true
        streamable-http:
          connections:
            mcp-server:
              url: http://localhost:8081
              endpoint: /mcp
