spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pokestore
    username: pokestore
    password: pokestore
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: ministral-3:3b
        options:
          temperature: 0.7
